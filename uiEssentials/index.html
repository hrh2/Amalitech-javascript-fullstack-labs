<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;500;700;900&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">

    <header class="topbar">
        <div class="brand">
            <div class="brand-logo">
                <div class="brand-logo-left"></div>
                <div class="brand-logo-right"></div>
            </div>
            <span class="brand-name">Character&nbsp;counter</span>
        </div>

        <button class="theme-toggle" type="button" aria-label="Toggle theme">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-sun"
                 viewBox="0 0 16 16">
                <path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6m0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8M8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0m0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13m8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5M3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8m10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0m-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0m9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707M4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708"/>
            </svg>
        </button>
    </header>

    <main>
        <h1 class="hero-title">Analyze your text<br>in real-time.</h1>

        <div class="editor-card">
      <textarea
              class="editor-textarea"
              placeholder="Start typing here… (or paste your text)"
              aria-label="Text to analyze"
              rows="6"
      >Design is the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every interaction. A great design transforms complex ideas into elegant solutions, making them easy to understand. It blends aesthetics and functionality seamlessly.
      </textarea>
        </div>

        <div class="options-row">
            <div class="options-left">
                <label class="checkbox">
                    <input type="checkbox">
                    <span class="checkbox-box" aria-hidden="true"></span>
                    <span class="checkbox-label">Exclude Spaces</span>
                </label>

                <label class="checkbox">
                    <input type="checkbox">
                    <span class="checkbox-box" aria-hidden="true"></span>
                    <span class="checkbox-label">Set Character Limit</span>
                </label>

                <input
                        type="number"
                        class="limit-input"
                        min="1"
                        value="300"
                        aria-label="Character limit"
                        disabled
                >
            </div>

            <p class="reading-time">Approx. reading time: &lt;1 minute</p>
        </div>

        <section class="stats-grid" aria-label="Text statistics">
            <div class="stat-card stat-purple">
                <span class="stat-number">508</span>
                <span class="stat-label">Total Characters</span>
                <div class="pattern1">
                    <div class="circle-grid">
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>

                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>

                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>

                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>
            <div class="stat-card stat-orange">
                <span class="stat-number">86</span>
                <span class="stat-label">Word Count</span>
                <div class="pattern2">
                    <span></span>
                    <span></span>
                    <span></span>

                    <span></span>
                    <span></span>
                    <span></span>

                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
            <div class="stat-card stat-coral">
                <span class="stat-number">06</span>
                <span class="stat-label">Line Count</span>
                <div class="pattern3">
                    <div class="cell tl"></div>
                    <div class="cell tc"></div>
                    <div class="cell tr"></div>

                    <div class="cell ml"></div>
                    <div class="cell center"></div>
                    <div class="cell mr"></div>

                    <div class="cell bl"></div>
                    <div class="cell bc"></div>
                    <div class="cell br"></div>
                </div>
            </div>
        </section>

        <section class="density-section" aria-label="Letter density">
            <h2 class="density-heading">Letter Density</h2>

            <div class="density-list">
                <div class="density-row">
                    <span class="density-letter">E</span>
                    <span class="density-track"><span class="density-fill" style="width:13.85%"></span></span>
                    <span class="density-count">59 (13.85%)</span>
                </div>
                <div class="density-row">
                    <span class="density-letter">I</span>
                    <span class="density-track"><span class="density-fill" style="width:9.63%"></span></span>
                    <span class="density-count">41 (9.63%)</span>
                </div>
                <div class="density-row">
                    <span class="density-letter">T</span>
                    <span class="density-track"><span class="density-fill" style="width:8.92%"></span></span>
                    <span class="density-count">38 (8.92%)</span>
                </div>
                <div class="density-row">
                    <span class="density-letter">O</span>
                    <span class="density-track"><span class="density-fill" style="width:7.98%"></span></span>
                    <span class="density-count">34 (7.98%)</span>
                </div>
                <div class="density-row">
                    <span class="density-letter">C</span>
                    <span class="density-track"><span class="density-fill" style="width:4%"></span></span>
                    <span class="density-count">3 (4%)</span>
                </div>
            </div>

            <!--      <button class="see-more" type="button">-->
            <!--        <span>See more</span>-->
            <!--        <svg width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">-->
            <!--          <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>-->
            <!--        </svg>-->
            <!--      </button>-->
        </section>
    </main>
</div>
</body>
</html>
